	<style>
		@media (prefers-reduced-motion: no-preference) {
			.book-animate {

				path {
					transform-origin: calc(100% - 30px) 50%;
					animation: turn 4s ease-in-out infinite alternate both;
				}

				path:nth-of-type(1) {
					animation-delay: 0.3s;
				}

				path:nth-of-type(2) {
