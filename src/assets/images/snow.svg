<svg
	xmlns="http://www.w3.org/2000/svg"
	viewBox="0 0 1024 1024"
	fill="none"
	stroke="CanvasText"
	stroke-linecap="round"
	stroke-linejoin="round"
	stroke-width="30"
	id="snow"
>
	<path d="M512 15v994" />
	<path d="M702 53 322 971" />
	<path d="M863 161 161 863" />
	<path d="M974 328 50 696" />
	<path d="M1009 512H15" />
	<path d="M975 692 49 332" />
	<path d="M863 863 161 161" />
	<path d="M697 973 327 51" />

	<style>
		@media (prefers-reduced-motion: no-preference) {
			#snow.animate {
				& > path {
					animation: spin 4s ease-in-out infinite;
				}
				& > path:nth-of-type(1) {
					animation-delay: 0s;
				}
				& > path:nth-of-type(2) {
					animation-delay: 0.15s;
				}
				& > path:nth-of-type(3) {
					animation-delay: 0.3s;
				}
				& > path:nth-of-type(4) {
					animation-delay: 0.45s;
				}
				& > path:nth-of-type(5) {
					animation-delay: 0.6s;
				}
				& > path:nth-of-type(6) {
					animation-delay: 0.75s;
				}
				& > path:nth-of-type(7) {
					animation-delay: 0.95s;
				}
				& > path:nth-of-type(8) {
					animation-delay: 1.1s;
				}
			}

			@keyframes spin {
				to {
					rotate: 180deg;
				}
			}
		}
	</style>
</svg>
